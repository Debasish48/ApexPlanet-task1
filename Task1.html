<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics of Web Development</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #006d77;
            text-align: center;
        }

        p {
            line-height: 1.6;
        }

        img {
            width: 100%;
            max-width: 400px;
            display: block;
            margin: 20px auto;
            border-radius: 8px;
        }

        a {
            color: blue;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        button {
            background-color: #006d77;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #004f56;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Basics of Web Development</h1>

        <p>
            This webpage demonstrates the basic concepts of HTML, CSS, and JavaScript.
        </p>

        <img src="https://img.magnific.com/free-photo/website-development-links-seo-webinar-cyberspace-concept_53876-120953.jpg?semt=ais_hybrid&w=740&q=80"
             alt="Web Development">
        
        <p>
            Visit
            <a href="https://developer.mozilla.org" target="_blank">
                MDN Web Docs
            </a>
            to learn more about web development.
        </p>

        <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
        function showMessage() {
            alert("Hello! Welcome to Web Development.");
        }
    </script>
</body>
</html>
